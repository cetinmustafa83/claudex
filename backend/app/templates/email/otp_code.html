<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #ffffff; background-color: #09090b; margin: 0; padding: 0;">
    <div style="max-width: 600px; margin: 0 auto; padding: 40px 20px; background-color: #09090b;">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: #ffffff; font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -0.025em;">Claudex</h1>
            <p style="color: #a0a0a0; font-size: 16px; margin: 8px 0 0 0;">AI-powered development environment</p>
        </div>

        <div style="background: #141414; padding: 32px; border-radius: 12px; border: 1px solid #2a2a2a; margin-bottom: 32px;">
            <h2 style="margin: 0 0 24px 0; color: #ffffff; font-size: 24px; font-weight: 600;">Your Login Code</h2>
            <p style="color: #c0c0c0; margin: 0 0 32px 0; font-size: 16px;">Use the following code to log in to your Claudex account:</p>

            <div style="text-align: center; margin: 32px 0;">
                <div style="background: #09090b; padding: 24px 48px; border-radius: 12px; border: 1px solid #2a2a2a; display: inline-block;">
                    <span style="font-family: 'SF Mono', 'Fira Code', monospace; font-size: 36px; font-weight: 700; color: #ffffff; letter-spacing: 0.5em;">{{ otp_code }}</span>
                </div>
            </div>

            <p style="color: #64748b; font-size: 14px; text-align: center; margin: 24px 0 0 0;">This code will expire in 10 minutes.</p>
        </div>

        <div style="color: #64748b; font-size: 14px; text-align: center; border-top: 1px solid #2a2a2a; padding-top: 24px;">
            <p style="margin: 0 0 16px 0;">If you didn't request this code, you can safely ignore this email.</p>
            <p style="margin: 0; font-size: 12px;">© 2025 Claudex. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
